<!doctype html>
<html lang="es" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/crest-icon.png" />
    <link rel="apple-touch-icon" href="/crest-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0c1733" />

    <meta name="description" content="Manchester Piti — Club de Fútbol. Partidos, estadísticas y plantilla del equipo." />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Manchester Piti — Club de Fútbol" />

    <meta property="og:image" content="/crest.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:image" content="/crest.png" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem("mp_theme");
          if (t !== "light" && t !== "dark") {
            t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          }
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
