name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# Cancel superseded runs on the same ref so a quick succession of pushes
# doesn't pile up redundant jobs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The must-have gate: lint (0 warnings — see --max-warnings 0), unit/component
  # tests, and a production build. Runs on every push and PR.
  verify:
    name: Lint · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # --max-warnings 0 makes any new lint warning fail CI. The pre-existing
      # Stats.tsx exhaustive-deps warning was fixed in this phase, so the tree is
      # warning-free; this guards against regressions.
      - name: Lint
        run: pnpm lint --max-warnings 0

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  # E2E gate. Runs the ?preview-based Playwright specs (no real auth) plus the
  # Firebase-emulator CRUD-persistence spec. The emulator suite needs Java; the
  # firebase-tools CLI is invoked via pnpm dlx so no global install is required.
  e2e:
    name: E2E (Playwright + Firebase emulator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # The Firebase Emulator Suite (Auth + Firestore) runs on the JVM.
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers (chromium)
        run: pnpm exec playwright install --with-deps chromium

      # Boot the Auth+Firestore emulators (firebase emulators:exec) and run the
      # whole Playwright suite against them. The ?preview specs ignore the
      # emulator; the CRUD spec relies on it. VITE_USE_FIREBASE_EMULATOR makes the
      # app's firebase.ts connect to the emulator ports. firebase-tools is run via
      # `pnpm dlx` so it needn't be a project dependency.
      - name: Run E2E (emulator)
        run: >-
          pnpm dlx firebase-tools emulators:exec
          --only auth,firestore
          --project futbolmanagement-dc6cb
          "pnpm test:e2e"
        env:
          VITE_USE_FIREBASE_EMULATOR: "1"

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
